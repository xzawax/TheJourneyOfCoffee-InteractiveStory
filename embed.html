<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The Journey of Coffee — an interactive infographic tracing every step from bean to cup."
    />

    <title>The Journey of Coffee: From Bean to Cup ( EMBED )</title>
    

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css" />

    <style>
      html,body{
        width:100%;
        height:100%;
        margin:0;
        padding:0;
      }

      ::-webkit-scrollbar {
        width: 0px;
        height: 0px;
        background: transparent; /* make scrollbar transparent */
        appearance: none;
      }

      .embed-page{
        width:100%;
        height:100%;
        margin:0;
        padding:0;
      }

      /* Temporary inline the css, for a quick demonstration */
      .embed-content{display:table;width:100%;height:100%;}
      .embed-content >div{width:50%;display:table-cell;vertical-align:top;}
      .embed-content >div:first-child{border-right:2px solid #ccc; text-align:center;}
      /* .embed-content >div:last-child{width:50%;display:table-cell;} */

      @media (max-width: 900px) {
        .embed-content>div{width:100%;height:50%;display:table-row}
        .embed-content>div:first-child{height:15%}
      }
    </style>
  </head>

  <body class="embed-page">

    <div class="embed-content">
      <div >
        <h3 style="padding:30px 0;">Showcase of embedding iframe</h3>
        <p>This is a simple showcase of how an iframe can be embedded within a page.</p>
      </div>

      <div>
        <iframe
          src="index.html"
          width="100%"
          height="100%"
          style="border:none;"
          title="The Journey of Coffee"
        ></iframe>
      </div>
    </div>
  </body>
</html>
