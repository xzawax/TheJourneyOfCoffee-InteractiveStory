<!--
  Component: cherry-cluster
  Pure CSS coffee cherry cluster illustration.
  GSAP floats the group and each cherry individually.

  Usage in HTML:
    <div data-component="cherry-cluster"></div>

  JS counterpart: components/js/CherryFloat.js
  Styles: css/style.css → .harvest__cherry-group, .harvest__cherry
-->
<div
  class="harvest__cherry-group"
  data-gsap="cherry-float"
  role="img"
  aria-label="Illustration of coffee cherries"
>
  <div class="harvest__cherry harvest__cherry--1"></div>
  <div class="harvest__cherry harvest__cherry--2"></div>
  <div class="harvest__cherry harvest__cherry--3"></div>
  <div class="harvest__cherry harvest__cherry--4"></div>
  <div class="harvest__cherry harvest__cherry--5"></div>
</div>
